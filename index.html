<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LZ-Team</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            background: white;
            padding: 80px 60px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            margin: 20px;
        }

        .avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 30px;
            font-size: 42px;
            color: white;
        }

        h1 {
            font-size: 36px;
            color: #333;
            margin-bottom: 12px;
        }

        .greeting {
            font-size: 18px;
            color: #666;
            margin-bottom: 24px;
        }

        .status {
            display: inline-block;
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
            padding: 8px 24px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
        }

        .info {
            margin-top: 30px;
            font-size: 14px;
            color: #aaa;
            line-height: 1.8;
        }

        .emoji {
            font-size: 60px;
            margin-bottom: 20px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="emoji">🚀</span>
        <h1>LZ-Team</h1>
        <p class="greeting">博客搭建成功！</p>
        <span class="status">✅ GitHub Pages 运行中</span>
        <div class="info">
            访问地址：LZ-Team.github.io<br>
            开始你的创作吧 🎉
        </div>
    </div>
</body>
</html>
