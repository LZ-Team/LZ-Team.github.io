<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="LZ-Team CTF Writeup 博客，记录 Web、Pwn、Reverse、Crypto、Misc 解题复盘。">
    <title>Writeups | LZ-Team</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="grid-overlay"></div>

    <header class="site-header">
        <a class="brand" href="index.html">
            <span class="brand-mark logo-mark"><img src="lz_logo.png" alt="LZ-Team Logo"></span>
            <span>
                <strong>LZ-Team</strong>
                <small>Capture The Flag</small>
            </span>
        </a>
        <button class="nav-toggle" type="button" aria-label="打开导航">☰</button>
        <nav class="site-nav">
            <a href="index.html">Home</a>
            <a href="writeups.html" class="active">Writeups</a>
            <a href="members.html">Members</a>
            <a href="honors.html">Honors</a>
        </nav>
    </header>

    <main>
        <section class="section page-hero">
            <p class="eyebrow">lz@writeups:~$ grep -r "flag" ./</p>
            <h1 data-text="Writeups">Writeups</h1>
            <p class="hero-text">这里是 LZ-Team 的解题档案库。文章以 Markdown 存放在 <code>posts/</code>，列表数据集中维护在 <code>data.js</code>，适合 GitHub Pages 静态部署。</p>
        </section>

        <section class="section">
            <div class="toolbar">
                <div class="filters">
                    <button class="filter-btn active" type="button" data-filter="all">ALL</button>
                    <button class="filter-btn" type="button" data-filter="web">WEB</button>
                    <button class="filter-btn" type="button" data-filter="pwn">PWN</button>
                    <button class="filter-btn" type="button" data-filter="reverse">REVERSE</button>
                    <button class="filter-btn" type="button" data-filter="crypto">CRYPTO</button>
                    <button class="filter-btn" type="button" data-filter="misc">MISC</button>
                </div>
                <label class="search-box">
                    <input id="writeupSearch" type="search" placeholder="search: title / tag / payload">
                </label>
            </div>

            <div class="empty-state">没有匹配的 Writeup，换个关键词试试。</div>

            <div id="writeupGrid" class="writeup-grid">
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>2026 LZ-Team · Writeups · cat /flag</p>
        <a href="index.html">返回主页 →</a>
    </footer>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
